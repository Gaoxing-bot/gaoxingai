<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CES/IFA 销售数据可视化平台</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            padding: 30px;
            text-align: center;
            border-bottom: 2px solid #3b82f6;
        }
        .header h1 {
            font-size: 28px;
            color: #60a5fa;
            margin-bottom: 10px;
        }
        .header .subtitle {
            color: #94a3b8;
            font-size: 14px;
        }
        .header .update-time {
            color: #64748b;
            font-size: 12px;
            margin-top: 8px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .kpi-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 40px rgba(59, 130, 246, 0.15);
        }
        .kpi-card .label {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .kpi-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #f8fafc;
            margin-bottom: 8px;
        }
        .kpi-card .change {
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .kpi-card .change.up { color: #4ade80; }
        .kpi-card .change.down { color: #f87171; }
        .kpi-card .change.neutral { color: #94a3b8; }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .chart-card {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
        }
        .chart-card h3 {
            font-size: 16px;
            color: #cbd5e1;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #334155;
        }
        .chart-container {
            position: relative;
            height: 300px;
        }
        .full-width {
            grid-column: 1 / -1;
        }
        .data-table {
            background: #1e293b;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #334155;
            overflow-x: auto;
        }
        .data-table h3 {
            font-size: 16px;
            color: #cbd5e1;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #334155;
        }
        th {
            color: #60a5fa;
            font-weight: 600;
            background: #0f172a;
        }
        td {
            color: #cbd5e1;
        }
        tr:hover td {
            background: #252f47;
        }
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-ces { background: #1e40af; color: #93c5fd; }
        .badge-ifa { background: #991b1b; color: #fca5a5; }
        .badge-manager { background: #065f46; color: #6ee7b7; }
        .refresh-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
            transition: all 0.3s;
            z-index: 1000;
        }
        .refresh-btn:hover {
            background: #2563eb;
            transform: scale(1.1);
        }
        .refresh-btn.spinning {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .loading-overlay.active {
            display: flex;
        }
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #334155;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @media (max-width: 768px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }
            .kpi-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>CES / IFA 销售数据可视化平台</h1>
        <div class="subtitle">展会销售数据实时监控与分析</div>
        <div class="update-time">数据更新时间：<span id="updateTime">--</span></div>
    </div>

    <div class="container">
        <!-- KPI 总览 -->
        <div class="kpi-grid">
            <div class="kpi-card">
                <div class="label">总销售额</div>
                <div class="value" id="totalSales">--</div>
                <div class="change up">
                    <span>↑</span>
                    <span id="salesGrowth">--</span>
                </div>
            </div>
            <div class="kpi-card">
                <div class="label">总毛利</div>
                <div class="value" id="totalProfit">--</div>
                <div class="change up">
                    <span>↑</span>
                    <span id="profitGrowth">--</span>
                </div>
            </div>
            <div class="kpi-card">
                <div class="label">参展企业总数</div>
                <div class="value" id="totalCompanies">--</div>
                <div class="change neutral">
                    <span>累计服务</span>
                </div>
            </div>
            <div class="kpi-card">
                <div class="label">总展位面积</div>
                <div class="value" id="totalArea">--</div>
                <div class="change neutral">
                    <span>平方米</span>
                </div>
            </div>
        </div>

        <!-- 图表区域 -->
        <div class="chart-grid">
            <div class="chart-card">
                <h3>📈 年度销售趋势（2024-2026）</h3>
                <div class="chart-container">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>👥 项目经理业绩对比</h3>
                <div class="chart-container">
                    <canvas id="managerChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>🏢 CES vs IFA 销售对比</h3>
                <div class="chart-container">
                    <canvas id="exhibitionChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>💰 专区/展团毛利贡献</h3>
                <div class="chart-container">
                    <canvas id="profitTypeChart"></canvas>
                </div>
            </div>
            <div class="chart-card full-width">
                <h3>📊 面积效率分析（每平米销售额/毛利）</h3>
                <div class="chart-container">
                    <canvas id="efficiencyChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 数据明细表 -->
        <div class="data-table">
            <h3>📋 数据明细</h3>
            <table>
                <thead>
                    <tr>
                        <th>项目</th>
                        <th>项目经理</th>
                        <th>参展企业</th>
                        <th>展位面积</th>
                        <th>销售总金额</th>
                        <th>专区毛利</th>
                        <th>展团毛利</th>
                        <th>合计</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <button class="refresh-btn" onclick="refreshData()" title="刷新数据">🔄</button>
    
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <script>
        // 数据定义
        const rawData = [
            { year: 2025, project: 'CES', manager: '刘汉华', companies: 84, area: 1962, sales: 1043800 + 1578501.35, zoneProfit: 1006930.46, groupProfit: 327286.77 },
            { year: 2025, project: 'CES', manager: '周娟', companies: 57, area: 1267.2, sales: 776683 + 900984.85, zoneProfit: 613103.28, groupProfit: 160194.11 },
            { year: 2025, project: 'IFA', manager: '刘汉华', companies: 46, area: 910, sales: 770590.79, zoneProfit: 602677.65, groupProfit: 6646.24 },
            { year: 2025, project: 'IFA', manager: '周娟', companies: 30, area: 769.50, sales: 628400.9 + 124412.40, zoneProfit: 428569.07, groupProfit: 13324.4 },
            { year: 2024, project: 'CES', manager: '刘汉华', companies: 83, area: 2054.52, sales: 1225364 + 10684.93, zoneProfit: 470377.79, groupProfit: 298924 },
            { year: 2024, project: 'CES', manager: '周娟', companies: 38, area: 774, sales: 479137.07, zoneProfit: 148925.71, groupProfit: 218924.11 },
            { year: 2024, project: 'IFA', manager: '刘汉华', companies: 38, area: 601.42, sales: 622215.38, zoneProfit: 620054.73, groupProfit: 0 },
            { year: 2024, project: 'IFA', manager: '周娟', companies: 27, area: 322.95, sales: 399240.35, zoneProfit: 402381.98, groupProfit: 0 },
            { year: 2026, project: 'CES', manager: '刘汉华', companies: 74, area: 2169, sales: 1318588.81, zoneProfit: 1143951.76, groupProfit: 62830.14 },
            { year: 2026, project: 'CES', manager: '周娟', companies: 69, area: 1771.20, sales: 1090949.06, zoneProfit: 704739.97, groupProfit: 70079.15 }
        ];

        // 计算合计
        rawData.forEach(d => {
            d.totalProfit = d.zoneProfit + d.groupProfit;
            d.salesPerArea = d.sales / d.area;
            d.profitPerArea = d.totalProfit / d.area;
        });

        // 格式化金额
        function formatMoney(num) {
            if (num >= 1000000) {
                return '¥' + (num / 1000000).toFixed(2) + 'M';
            } else if (num >= 1000) {
                return '¥' + (num / 1000).toFixed(1) + 'K';
            }
            return '¥' + num.toFixed(2);
        }

        // 更新KPI
        function updateKPIs() {
            const totalSales = rawData.reduce((sum, d) => sum + d.sales, 0);
            const totalProfit = rawData.reduce((sum, d) => sum + d.totalProfit, 0);
            const totalCompanies = rawData.reduce((sum, d) => sum + d.companies, 0);
            const totalArea = rawData.reduce((sum, d) => sum + d.area, 0);

            document.getElementById('totalSales').textContent = formatMoney(totalSales);
            document.getElementById('totalProfit').textContent = formatMoney(totalProfit);
            document.getElementById('totalCompanies').textContent = totalCompanies + '家';
            document.getElementById('totalArea').textContent = totalArea.toFixed(0);

            // 计算增长率（2024 vs 2025）
            const sales2024 = rawData.filter(d => d.year === 2024).reduce((sum, d) => sum + d.sales, 0);
            const sales2025 = rawData.filter(d => d.year === 2025).reduce((sum, d) => sum + d.sales, 0);
            const salesGrowth = ((sales2025 - sales2024) / sales2024 * 100).toFixed(1);
            document.getElementById('salesGrowth').textContent = salesGrowth + '% (2024→2025)';

            const profit2024 = rawData.filter(d => d.year === 2024).reduce((sum, d) => sum + d.totalProfit, 0);
            const profit2025 = rawData.filter(d => d.year === 2025).reduce((sum, d) => sum + d.totalProfit, 0);
            const profitGrowth = ((profit2025 - profit2024) / profit2024 * 100).toFixed(1);
            document.getElementById('profitGrowth').textContent = profitGrowth + '% (2024→2025)';
        }

        // 年度趋势图
        function createTrendChart() {
            const years = [2024, 2025, 2026];
            const cesData = years.map(y => rawData.filter(d => d.year === y && d.project === 'CES').reduce((sum, d) => sum + d.sales, 0));
            const ifaData = years.map(y => rawData.filter(d => d.year === y && d.project === 'IFA').reduce((sum, d) => sum + d.sales, 0));
            const cesProfit = years.map(y => rawData.filter(d => d.year === y && d.project === 'CES').reduce((sum, d) => sum + d.totalProfit, 0));
            const ifaProfit = years.map(y => rawData.filter(d => d.year === y && d.project === 'IFA').reduce((sum, d) => sum + d.totalProfit, 0));

            new Chart(document.getElementById('trendChart'), {
                type: 'line',
                data: {
                    labels: years,
                    datasets: [
                        { label: 'CES 销售额', data: cesData, borderColor: '#3b82f6', backgroundColor: 'rgba(59, 130, 246, 0.1)', tension: 0.4, fill: true },
                        { label: 'IFA 销售额', data: ifaData, borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', tension: 0.4, fill: true },
                        { label: 'CES 毛利', data: cesProfit, borderColor: '#60a5fa', borderDash: [5, 5], tension: 0.4 },
                        { label: 'IFA 毛利', data: ifaProfit, borderColor: '#f87171', borderDash: [5, 5], tension: 0.4 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: { labels: { color: '#cbd5e1' } },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            titleColor: '#f8fafc',
                            bodyColor: '#cbd5e1',
                            borderColor: '#334155',
                            borderWidth: 1,
                            callbacks: { label: (ctx) => ctx.dataset.label + ': ' + formatMoney(ctx.raw) }
                        }
                    },
                    scales: {
                        x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', callback: (v) => formatMoney(v) } }
                    }
                }
            });
        }

        // 项目经理对比
        function createManagerChart() {
            const managers = ['刘汉华', '周娟'];
            const salesData = managers.map(m => rawData.filter(d => d.manager === m).reduce((sum, d) => sum + d.sales, 0));
            const profitData = managers.map(m => rawData.filter(d => d.manager === m).reduce((sum, d) => sum + d.totalProfit, 0));

            new Chart(document.getElementById('managerChart'), {
                type: 'bar',
                data: {
                    labels: managers,
                    datasets: [
                        { label: '销售额', data: salesData, backgroundColor: '#3b82f6' },
                        { label: '毛利', data: profitData, backgroundColor: '#10b981' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#cbd5e1' } },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            titleColor: '#f8fafc',
                            bodyColor: '#cbd5e1',
                            borderColor: '#334155',
                            borderWidth: 1,
                            callbacks: { label: (ctx) => ctx.dataset.label + ': ' + formatMoney(ctx.raw) }
                        }
                    },
                    scales: {
                        x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', callback: (v) => formatMoney(v) } }
                    }
                }
            });
        }

        // CES vs IFA
        function createExhibitionChart() {
            const years = [2024, 2025, 2026];
            const cesSales = years.map(y => rawData.filter(d => d.year === y && d.project === 'CES').reduce((sum, d) => sum + d.sales, 0));
            const ifaSales = years.map(y => rawData.filter(d => d.year === y && d.project === 'IFA').reduce((sum, d) => sum + d.sales, 0));

            new Chart(document.getElementById('exhibitionChart'), {
                type: 'bar',
                data: {
                    labels: years,
                    datasets: [
                        { label: 'CES', data: cesSales, backgroundColor: '#3b82f6' },
                        { label: 'IFA', data: ifaSales, backgroundColor: '#ef4444' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#cbd5e1' } },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            titleColor: '#f8fafc',
                            bodyColor: '#cbd5e1',
                            borderColor: '#334155',
                            borderWidth: 1,
                            callbacks: { label: (ctx) => ctx.dataset.label + ': ' + formatMoney(ctx.raw) }
                        }
                    },
                    scales: {
                        x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8' } },
                        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', callback: (v) => formatMoney(v) } }
                    }
                }
            });
        }

        // 专区/展团毛利
        function createProfitTypeChart() {
            const zoneTotal = rawData.reduce((sum, d) => sum + d.zoneProfit, 0);
            const groupTotal = rawData.reduce((sum, d) => sum + d.groupProfit, 0);

            new Chart(document.getElementById('profitTypeChart'), {
                type: 'doughnut',
                data: {
                    labels: ['专区毛利', '展团毛利'],
                    datasets: [{
                        data: [zoneTotal, groupTotal],
                        backgroundColor: ['#3b82f6', '#10b981'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#cbd5e1' } },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            titleColor: '#f8fafc',
                            bodyColor: '#cbd5e1',
                            borderColor: '#334155',
                            borderWidth: 1,
                            callbacks: { label: (ctx) => ctx.label + ': ' + formatMoney(ctx.raw) + ' (' + (ctx.raw / (zoneTotal + groupTotal) * 100).toFixed(1) + '%)' }
                        }
                    }
                }
            });
        }

        // 面积效率
        function createEfficiencyChart() {
            const labels = rawData.map(d => d.year + d.project + '-' + d.manager);
            const salesPerArea = rawData.map(d => d.salesPerArea);
            const profitPerArea = rawData.map(d => d.profitPerArea);

            new Chart(document.getElementById('efficiencyChart'), {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { label: '每平米销售额', data: salesPerArea, backgroundColor: '#3b82f6' },
                        { label: '每平米毛利', data: profitPerArea, backgroundColor: '#10b981' }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { labels: { color: '#cbd5e1' } },
                        tooltip: {
                            backgroundColor: '#1e293b',
                            titleColor: '#f8fafc',
                            bodyColor: '#cbd5e1',
                            borderColor: '#334155',
                            borderWidth: 1,
                            callbacks: { label: (ctx) => ctx.dataset.label + ': ¥' + ctx.raw.toFixed(0) }
                        }
                    },
                    scales: {
                        x: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', maxRotation: 45 } },
                        y: { grid: { color: '#334155' }, ticks: { color: '#94a3b8', callback: (v) => '¥' + v.toFixed(0) } }
                    }
                }
            });
        }

        // 更新数据表
        function updateTable() {
            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = rawData.map(d => `
                <tr>
                    <td><span class="badge badge-${d.project.toLowerCase()}">${d.year}${d.project}</span></td>
                    <td><span class="badge badge-manager">${d.manager}</span></td>
                    <td>${d.companies}家</td>
                    <td>${d.area}㎡</td>
                    <td>${formatMoney(d.sales)}</td>
                    <td>${formatMoney(d.zoneProfit)}</td>
                    <td>${formatMoney(d.groupProfit)}</td>
                    <td><strong>${formatMoney(d.totalProfit)}</strong></td>
                </tr>
            `).join('');
        }

        // 刷新数据
        function refreshData() {
            const btn = document.querySelector('.refresh-btn');
            const overlay = document.getElementById('loadingOverlay');
            
            btn.classList.add('spinning');
            overlay.classList.add('active');
            
            // 模拟数据刷新
            setTimeout(() => {
                document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
                btn.classList.remove('spinning');
                overlay.classList.remove('active');
            }, 1500);
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('updateTime').textContent = new Date().toLocaleString('zh-CN');
            updateKPIs();
            createTrendChart();
            createManagerChart();
            createExhibitionChart();
            createProfitTypeChart();
            createEfficiencyChart();
            updateTable();
        });
    </script>
</body>
</html>
